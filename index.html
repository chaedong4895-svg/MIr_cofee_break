<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미르커피브레이크 2026 ☕</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --coffee-dark: #3B2314;
  --coffee-mid: #6B3F2A;
  --coffee-warm: #A0522D;
  --coffee-light: #C8956C;
  --caramel: #D4831A;
  --cream: #F5EDD8;
  --cream-light: #FBF6EC;
  --steam: #E8D5B7;
  --text-dark: #2C1A0E;
  --shadow: 0 2px 8px rgba(59,35,20,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; font-weight: 400; background: var(--cream-light); color: var(--text-dark); min-height: 100vh; }

/* NAV */
#nav { background: var(--coffee-mid); padding: 0 12px; display: flex; align-items: center; gap: 2px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.25); flex-wrap: wrap; }
.nav-brand { color: var(--cream); font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; padding: 14px 12px 14px 4px; margin-right: 6px; white-space: nowrap; border-right: 1px solid var(--coffee-warm); flex-shrink: 0; }
.nav-btn { background: none; border: none; color: var(--steam); padding: 14px 8px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; transition: color 0.2s, background 0.2s; border-radius: 4px; position: relative; white-space: nowrap; }
.nav-btn:hover { color: var(--cream); background: rgba(255,255,255,0.08); }
.nav-btn.active { color: var(--caramel); font-weight: 500; }
.nav-badge { background: var(--caramel); color: white; font-size: 10px; font-weight: 500; padding: 1px 5px; border-radius: 10px; position: absolute; top: 5px; right: 0; }
.nav-spacer { flex: 1; }
.nav-user { color: var(--steam); font-size: 13px; padding: 12px 6px; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
.btn-logout { background: none; border: 1px solid var(--coffee-light); color: var(--steam); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s; }
.btn-logout:hover { background: rgba(255,255,255,0.1); color: var(--cream); }

/* MAIN */
#main { max-width: 860px; margin: 0 auto; padding: 24px 16px 48px; }

/* CARD */
.card { background: white; border-radius: 12px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 16px; }
.activity-card { background: var(--coffee-dark); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; color: var(--cream); }
.team-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; margin-bottom: 10px; }
.badge-1 { background: var(--coffee-warm); color: var(--cream); }
.badge-2 { background: #7A4F2B; color: var(--cream); }
.badge-3 { background: var(--coffee-light); color: var(--coffee-dark); }
.activity-meta { font-size: 12px; color: var(--steam); margin-bottom: 8px; }
.activity-topic { font-family: 'Noto Serif KR', serif; font-size: 17px; font-weight: 600; color: var(--caramel); margin-bottom: 12px; line-height: 1.5; }
.activity-content { font-size: 14px; color: var(--cream); line-height: 1.8; white-space: pre-wrap; }
.content-placeholder { color: var(--steam); font-size: 13px; font-style: italic; }

/* BUTTONS */
.btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500; transition: all 0.2s; }
.btn-primary { background: var(--caramel); color: white; }
.btn-primary:hover { background: #bf7416; }
.btn-primary:disabled { background: var(--steam); color: var(--coffee-light); cursor: not-allowed; }
.btn-outline { background: none; border: 1px solid var(--caramel); color: var(--caramel); }
.btn-outline:hover { background: var(--caramel); color: white; }
.btn-ghost { background: rgba(255,255,255,0.1); color: var(--cream); border: 1px solid rgba(255,255,255,0.2); font-size: 12px; padding: 6px 12px; }
.btn-ghost:hover { background: rgba(255,255,255,0.2); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-danger { background: none; border: 1px solid #c0392b; color: #c0392b; }
.btn-danger:hover { background: #c0392b; color: white; }
.btn-success { background: #27ae60; color: white; }
.btn-success:hover { background: #219a52; }


/* COMMENTS */
.comments-section { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 14px; margin-top: 14px; }
.comments-title { font-size: 12px; color: var(--steam); margin-bottom: 12px; font-weight: 500; letter-spacing: 0.5px; }
.comment-item { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
.comment-item:last-child { border-bottom: none; }
.comment-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.comment-author { font-size: 12px; font-weight: 500; color: var(--caramel); }
.comment-time { font-size: 11px; color: var(--steam); font-weight: 300; }
.comment-text { font-size: 13px; color: var(--cream); line-height: 1.7; white-space: pre-wrap; }
.reactions-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.reaction-btn { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); color: var(--steam); padding: 3px 9px; border-radius: 12px; font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif; }
.reaction-btn:hover { background: rgba(212,131,26,0.3); border-color: var(--caramel); }
.reaction-btn.active { background: var(--caramel); color: white; border-color: var(--caramel); }
.btn-del-comment { background: none; border: none; color: rgba(255,255,255,0.2); cursor: pointer; font-size: 12px; padding: 2px 4px; transition: color 0.2s; }
.btn-del-comment:hover { color: #e74c3c; }

/* COMMENT INPUT */
.comment-input-area { margin-top: 14px; }
.comment-input-row { display: flex; gap: 8px; align-items: flex-end; }
textarea.comment-input { flex: 1; background: rgba(255,255,255,0.09); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: var(--cream); font-family: 'Noto Sans KR', sans-serif; font-size: 13px; padding: 10px; resize: vertical; min-height: 60px; }
textarea.comment-input::placeholder { color: var(--steam); opacity: 0.6; }
textarea.comment-input:focus { outline: none; border-color: var(--caramel); background: rgba(255,255,255,0.12); }
.ai-assist-btn { background: none; border: 1px solid rgba(212,131,26,0.4); color: var(--caramel); width: 36px; height: 36px; border-radius: 8px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
.ai-assist-btn:hover { background: var(--caramel); color: white; border-color: var(--caramel); }

/* AI ASSIST PANEL */
.ai-assist-panel { background: rgba(255,255,255,0.07); border: 1px solid rgba(212,131,26,0.25); border-radius: 8px; padding: 12px; margin-top: 8px; }
.ai-assist-types { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.ai-type-btn { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.18); color: var(--steam); padding: 5px 11px; border-radius: 16px; font-size: 12px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s; }
.ai-type-btn:hover { background: rgba(212,131,26,0.3); border-color: var(--caramel); color: var(--cream); }
.ai-draft-box { background: rgba(255,255,255,0.06); border-radius: 6px; padding: 10px 12px; font-size: 13px; color: var(--cream); line-height: 1.7; margin-bottom: 8px; }
.ai-assist-hint { font-size: 11px; color: var(--steam); opacity: 0.7; }

/* FORMS */
.form-group { margin-bottom: 16px; }
label { display: block; font-size: 13px; font-weight: 500; color: var(--coffee-mid); margin-bottom: 5px; }
input[type="text"], input[type="password"], input[type="date"], input[type="number"], select, textarea.form-ctrl {
  width: 100%; padding: 10px 12px; border: 1px solid var(--steam); border-radius: 8px;
  font-family: 'Noto Sans KR', sans-serif; font-size: 14px; background: white; color: var(--text-dark); transition: border-color 0.2s;
}
input:focus, select:focus, textarea.form-ctrl:focus { outline: none; border-color: var(--caramel); }
textarea.form-ctrl { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* LOGIN */
.auth-wrap { max-width: 400px; margin: 48px auto; }
.auth-logo { font-family: 'Noto Serif KR', serif; font-size: 26px; color: var(--coffee-dark); text-align: center; margin-bottom: 4px; }
.auth-sub { color: var(--coffee-light); font-size: 13px; text-align: center; margin-bottom: 28px; }
.auth-link { background: none; border: none; color: var(--caramel); cursor: pointer; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; text-decoration: underline; }

/* STATS */
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--coffee-dark); border-radius: 12px; padding: 18px; text-align: center; color: var(--cream); }
.stat-num { font-family: 'Noto Serif KR', serif; font-size: 28px; font-weight: 600; color: var(--caramel); }
.stat-lbl { font-size: 12px; color: var(--steam); margin-top: 3px; }

/* DDAY BANNER */
.dday-banner { background: linear-gradient(135deg, var(--coffee-dark), var(--coffee-mid)); border-radius: 12px; padding: 16px 20px; color: var(--cream); margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
.dday-lbl { font-size: 12px; color: var(--steam); margin-bottom: 4px; }
.dday-count { font-family: 'Noto Serif KR', serif; font-size: 28px; font-weight: 600; color: var(--caramel); }
.dday-detail { font-size: 13px; color: var(--steam); text-align: right; line-height: 1.5; }

/* SECTION */
.section-title { font-family: 'Noto Serif KR', serif; font-size: 18px; color: var(--coffee-dark); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--steam); }

/* CALENDAR */
.cal-wrap { background: white; border-radius: 12px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; }
.cal-header { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 14px; }
.cal-nav { background: none; border: 1px solid var(--steam); width: 32px; height: 32px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.cal-nav:hover { background: var(--coffee-dark); color: var(--cream); border-color: var(--coffee-dark); }
.cal-title { font-family: 'Noto Serif KR', serif; font-size: 16px; color: var(--coffee-dark); min-width: 100px; text-align: center; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.cal-weekday { text-align: center; font-size: 11px; color: var(--coffee-light); font-weight: 500; padding: 4px 0 8px; }
.cal-day { text-align: center; padding: 7px 4px; border-radius: 6px; font-size: 13px; }
.cal-day.other-month { color: #ccc; }
.cal-day.today { font-weight: 700; color: var(--coffee-dark); border: 2px solid var(--caramel); }
.cal-day.completed { background: var(--caramel); color: white; font-weight: 500; }
.cal-day.scheduled { background: var(--steam); color: var(--coffee-dark); font-weight: 500; }

/* MEMBERS */
.team-member-card { background: white; border-radius: 12px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 16px; }
.team-member-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.team-member-title { font-family: 'Noto Serif KR', serif; font-size: 17px; color: var(--coffee-dark); }
.member-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.member-chip { background: var(--cream-light); border: 1px solid var(--steam); border-radius: 20px; padding: 5px 14px; font-size: 13px; color: var(--coffee-dark); }
.member-chip.leader { background: var(--coffee-dark); color: var(--cream); border-color: var(--coffee-dark); }

/* ADMIN */
.admin-tabs { display: flex; gap: 0; margin-bottom: 20px; background: white; border-radius: 8px; padding: 4px; box-shadow: var(--shadow); flex-wrap: wrap; }
.admin-tab { flex: 1; min-width: 70px; padding: 9px 6px; text-align: center; border: none; background: none; border-radius: 6px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: var(--coffee-mid); transition: all 0.2s; position: relative; }
.admin-tab.active { background: var(--coffee-dark); color: var(--cream); font-weight: 500; }
.pending-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: var(--cream-light); border-radius: 8px; margin-bottom: 8px; }
.pending-name { font-weight: 500; font-size: 14px; color: var(--coffee-dark); }
.pending-meta { font-size: 12px; color: var(--coffee-light); margin-top: 2px; }
.pending-actions { display: flex; gap: 6px; flex-shrink: 0; }
.member-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--cream-light); border-radius: 8px; margin-bottom: 8px; }

/* SCHEDULE LIST */
.sched-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: white; border-radius: 8px; margin-bottom: 8px; box-shadow: 0 1px 4px rgba(59,35,20,0.08); }
.sched-dday { background: var(--caramel); color: white; border-radius: 6px; padding: 4px 8px; font-size: 12px; font-weight: 500; min-width: 58px; text-align: center; }
.sched-dday.past { background: var(--steam); color: var(--coffee-mid); }
.sched-date { font-size: 13px; color: var(--coffee-dark); font-weight: 500; }
.sched-memo { font-size: 12px; color: var(--coffee-light); margin-top: 2px; }

/* MISC */
.msg-error { color: #c0392b; font-size: 13px; margin-top: 8px; }
.msg-info { color: var(--coffee-light); font-size: 13px; margin-top: 8px; }
.msg-success { color: #27ae60; font-size: 13px; margin-top: 8px; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--coffee-light); font-size: 14px; }
.loading-text { color: var(--caramel); font-size: 13px; font-style: italic; padding: 6px 0; }
.divider { height: 1px; background: var(--steam); margin: 16px 0; }

/* ACTIVITY ADMIN ACTIONS */
.activity-admin-bar { display: flex; gap: 6px; margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1); }

/* MANAGE TABLE */
.manage-activity-item { background: var(--cream-light); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
.manage-act-header { display: flex; align-items: center; justify-content: space-between; }
.manage-act-info { font-size: 13px; color: var(--coffee-dark); }
.manage-act-meta { font-size: 12px; color: var(--coffee-light); margin-top: 2px; }
.manage-act-actions { display: flex; gap: 6px; flex-shrink: 0; }

/* RESPONSIVE */
@media (max-width: 600px) {
  .stats-row { gap: 8px; }
  .stat-num { font-size: 22px; }
  .dday-banner { flex-direction: column; gap: 8px; }
  .dday-detail { text-align: left; }
  .form-row { grid-template-columns: 1fr; }
  .nav-brand { font-size: 13px; padding: 12px 10px 12px 2px; }
  .nav-btn { padding: 12px 6px; font-size: 12px; }
  .admin-tabs { flex-wrap: wrap; }
}
</style>
</head>
<body>
<nav id="nav"></nav>
<div id="main"></div>

<script>
/* ==============================
   CONSTANTS
============================== */
const ADMIN_NAME = '채동';
const ADMIN_PW   = 'mir2026!'; // 배포 전 변경

const TEAMS = {
  1: { name: '1조', leader: '강동윤', members: ['강동윤','강현모','김순원','김준범','박연정','송유천','이성훈'] },
  2: { name: '2조', leader: '김현겸', members: ['김현겸','강성욱','권이경','노정','이근빈','이민주','최규빈'] },
  3: { name: '3조', leader: '김대우', members: ['김대우','김성민','김진','윤정원','이가람','임현규','채동'] },
};

const AI_TYPES = ['공감 표현', '조언 한 마디', '질문으로 응원', '따뜻한 격려'];

const REACTION_TYPES = [
  { key: 'heart', label: '♥ 공감' },
  { key: 'star',  label: '★ 인사이트' },
  { key: 'me',    label: '! 나도요' },
];

/* ==============================
   STORAGE  (localStorage + Firebase REST API)
============================== */
const S = {
  get: async function(k) {
  const fbUrl = localStorage.getItem('mir_firebase_url') || DEFAULT_FB_URL;
  if (fbUrl && k.startsWith('mir_') && k !== 'mir_api_key' && k !== 'mir_firebase_url') {
    try {
      const path = k.replace('mir_', '');
      const res = await fetch(`${fbUrl}/${path}.json`);
      const data = await res.json();
      if (data !== null) return data;
    } catch(e) {}
  }
  try { return JSON.parse(localStorage.getItem(k)); } catch { return null; }
},
  set(k, v) {
    localStorage.setItem(k, JSON.stringify(v));
    // Firebase 백그라운드 동기화 (fire-and-forget)
    const fbUrl = localStorage.getItem('mir_firebase_url') || DEFAULT_FB_URL;
    if (fbUrl && k.startsWith('mir_') && k !== 'mir_api_key' && k !== 'mir_firebase_url') {
      const path = k.replace('mir_', '');
      fetch(`${fbUrl}/${path}.json`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(v),
      }).catch(() => {});
    }
  },
};

/* ==============================
   STATE
============================== */
const app = {
  user: null,           // { name, isAdmin, team? }
  screen: 'login',
  adminTab: 'members',
  editKey: null,        // activity key being edited
  calYear: new Date().getFullYear(),
  calMonth: new Date().getMonth(), // 0-indexed

  // data (loaded once)
  activities: {},
  comments: {},
  reactions: {},
  schedules: [],
  users: {},
  pending: {},

  // ephemeral UI
  aiAssistOpen: new Set(),
  aiAssistDraft: {},    // activityKey -> { type, text }
};

const DEFAULT_FB_URL = 'https://mir2026-default-rtdb.firebaseio.com/mir';

async function loadAll() {
  const fbUrl = localStorage.getItem('mir_firebase_url') || DEFAULT_FB_URL;
  try {
    const res = await fetch(`${fbUrl}.json`);
    if (res.ok) {
      const data = await res.json();
      if (data && typeof data === 'object') {
        app.activities = data.activities || {};
        app.comments   = data.comments   || {};
        app.reactions  = data.reactions  || {};
        app.schedules  = data.schedules  || [];
        app.users      = data.users      || {};
        app.pending    = data.pending    || {};
        return;
      }
    }
  } catch(e) { console.warn('Firebase 로드 실패:', e); }
  // fallback: localStorage
  app.activities = JSON.parse(localStorage.getItem('mir_activities') || '{}');
  app.comments   = JSON.parse(localStorage.getItem('mir_comments')   || '{}');
  app.reactions  = JSON.parse(localStorage.getItem('mir_reactions')  || '{}');
  app.schedules  = JSON.parse(localStorage.getItem('mir_schedules')  || '[]');
  app.users      = JSON.parse(localStorage.getItem('mir_users')      || '{}');
  app.pending    = JSON.parse(localStorage.getItem('mir_pending')    || '{}');
}

/* ==============================
   HELPERS
============================== */
function fmtDate(d) {
  // d = "YYYY-MM-DD" → "YYYY년 M월 D일"
  if (!d) return '';
  const [y, m, day] = d.split('-');
  return `${y}년 ${+m}월 ${+day}일`;
}

function fmtTime(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function dday(dateStr) {
  // dateStr = "YYYY-MM-DD"
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateStr); target.setHours(0,0,0,0);
  return Math.round((target - today) / 86400000);
}

function sortedActivities(teamNum) {
  return Object.entries(app.activities)
    .filter(([, a]) => a.team === teamNum)
    .sort((a, b) => new Date(b[1].date) - new Date(a[1].date));
}

function nextSchedule() {
  const today = new Date(); today.setHours(0,0,0,0);
  return app.schedules
    .filter(s => new Date(s.date) >= today)
    .sort((a, b) => new Date(a.date) - new Date(b.date))[0] || null;
}

function totalComments() {
  return Object.values(app.comments).reduce((n, arr) => n + arr.length, 0);
}

function pendingCount() {
  return Object.keys(app.pending).length;
}

/* ==============================
   AUTH
============================== */
function tryLogin(name, pw) {
  if (name === ADMIN_NAME && pw === ADMIN_PW) {
    app.user = { name, isAdmin: true };
    sessionStorage.setItem('mir_session', JSON.stringify(app.user));
    return 'ok';
  }
  if (app.users[name] && app.users[name].pw === pw) {
    app.user = { name, isAdmin: false, team: app.users[name].team };
    sessionStorage.setItem('mir_session', JSON.stringify(app.user));
    return 'ok';
  }
  if (app.pending[name]) return 'pending';
  return 'fail';
}

function logout() {
  app.user = null;
  sessionStorage.removeItem('mir_session');
  app.screen = 'login';
  render();
}

/* ==============================
   NAVIGATION RENDER
============================== */
function renderNav() {
  if (!app.user) { document.getElementById('nav').innerHTML = ''; return; }

/* ==============================
   ACTIVITY CARD
============================== */
function renderActivityCard(key, act, compact) {
  const hasContent = act.content && act.content.trim();
  const comments = app.comments[key] || [];
  const assistOpen = app.aiAssistOpen.has(key);
  const draft = app.aiAssistDraft[key];

  const adminBar = app.user && app.user.isAdmin ? `
    <div class="activity-admin-bar">
      <button class="btn btn-ghost btn-sm" data-action="edit-activity" data-key="${key}">✎ 수정</button>
      <button class="btn btn-danger btn-sm" data-action="del-activity" data-key="${key}">삭제</button>
    </div>` : '';

  if (compact) {
    return `
      <div class="activity-card">
        <span class="team-badge badge-${act.team}">${TEAMS[act.team].name}</span>
        <div class="activity-meta">${fmtDate(act.date)} · ${act.month}회차 · 발표자: ${act.speaker}</div>
        <div class="activity-topic">${act.topic}</div>
        ${hasContent
          ? `<div class="activity-content" style="max-height:80px;overflow:hidden">${act.content}</div>`
          : '<div class="content-placeholder">등록 예정</div>'}
      </div>`;
  }

  const commentsHtml = comments.map((c, idx) => {
    const rk = (type) => `${key}_${idx}_${type}`;
    const rxHtml = REACTION_TYPES.map(r => {
      const rxData = app.reactions[rk(r.key)] || { count: 0, users: [] };
      const active = rxData.users && rxData.users.includes(app.user.name);
      return `<button class="reaction-btn${active ? ' active' : ''}" data-action="react"
        data-key="${key}" data-idx="${idx}" data-rtype="${r.key}">${r.label} ${rxData.count || 0}</button>`;
    }).join('');

    const delBtn = app.user && app.user.isAdmin
      ? `<button class="btn-del-comment" data-action="del-comment" data-key="${key}" data-idx="${idx}" title="삭제">✕</button>`
      : '';

    return `<div class="comment-item">
      <div class="comment-header">
        <span class="comment-author">${c.author}</span>
        <span style="display:flex;align-items:center;gap:4px">
          <span class="comment-time">${fmtTime(c.time)}</span>
          ${delBtn}
        </span>
      </div>
      <div class="comment-text">${escHtml(c.text)}</div>
      <div class="reactions-row">${rxHtml}</div>
    </div>`;
  }).join('');

  const assistPanelHtml = assistOpen ? `
    <div class="ai-assist-panel" id="assist-panel-${key}">
      <div class="ai-assist-types">
        ${AI_TYPES.map(t => `<button class="ai-type-btn${draft && draft.type===t?' selected':''}" data-action="ai-type" data-key="${key}" data-type="${t}">${t}</button>`).join('')}
      </div>
      ${draft && draft.text ? `
        <div class="ai-draft-box">${escHtml(draft.text)}</div>
        <button class="btn btn-primary btn-sm" data-action="use-draft" data-key="${key}">이 내용 사용하기</button>
      ` : '<div class="ai-assist-hint">유형을 선택하면 AI가 댓글 초안을 작성해 드립니다</div>'}
    </div>` : '';

  return `
    <div class="activity-card" id="act-${key}">
      <span class="team-badge badge-${act.team}">${TEAMS[act.team].name}</span>
      <div class="activity-meta">${fmtDate(act.date)} · ${act.month}회차 · 발표자: ${act.speaker}</div>
      <div class="activity-topic">${escHtml(act.topic)}</div>
      ${hasContent
        ? `<div class="activity-content">${escHtml(act.content)}</div>`
        : '<div class="content-placeholder">📋 등록 예정</div>'}
      ${adminBar}
      <div class="comments-section">
        <div class="comments-title">💬 댓글 ${comments.length > 0 ? `(${comments.length})` : ''}</div>
        ${comments.length === 0 ? '<div style="font-size:12px;color:var(--steam);padding:4px 0">아직 댓글이 없습니다. 첫 번째 댓글을 남겨보세요!</div>' : commentsHtml}
        <div class="comment-input-area">
          <div class="comment-input-row">
            <textarea class="comment-input" id="cinput-${key}" placeholder="댓글을 입력하세요..." rows="2"></textarea>
            <button class="ai-assist-btn" data-action="toggle-assist" data-key="${key}" title="AI 글쓰기 도우미">✦</button>
          </div>
          ${assistPanelHtml}
          <div style="margin-top:8px;display:flex;justify-content:flex-end">
            <button class="btn btn-primary btn-sm" data-action="submit-comment" data-key="${key}">등록</button>
          </div>
        </div>
      </div>
    </div>`;
}

function renderSchedule() {
  const ns = nextSchedule();
  const ddayHtml = ns ? `

      </div>
      <div class="dday-detail">
        <div>${fmtDate(ns.date)}</div>
        <div style="margin-top:3px">${ns.team && +ns.team > 0 ? `${ns.team}조` : '전체 조'}${ns.memo ? ` · ${ns.memo}` : ''}</div>

  return `

  `;

function renderCalendar() {
  const y = app.calYear, m = app.calMonth;
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  // collect marked dates
  const completedDates = new Set(Object.values(app.activities).map(a => a.date));
  const scheduledDates = new Set(app.schedules.map(s => s.date));

  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const weekdays = ['일','월','화','수','목','금','토'];

  let cells = '';
  // empty cells before first day
  for (let i = 0; i < firstDay; i++) cells += '<div class="cal-day other-month"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt = new Date(y, m, d);
    const isToday = dt.getTime() === today.getTime();
    const isCompleted = completedDates.has(dateStr);
    const isScheduled = scheduledDates.has(dateStr) && !isCompleted;
    let cls = 'cal-day';
    if (isToday) cls += ' today';
    if (isCompleted) cls += ' completed';
    else if (isScheduled) cls += ' scheduled';
    cells += `<div class="${cls}">${d}</div>`;
  }

  return `
    <div class="cal-wrap">
      <div class="cal-header">
        <button class="cal-nav" data-action="cal-prev">◀</button>
        <div class="cal-title">${y}년 ${months[m]}</div>
        <button class="cal-nav" data-action="cal-next">▶</button>
      </div>
      <div class="cal-grid">
        ${weekdays.map(w => `<div class="cal-weekday">${w}</div>`).join('')}
        ${cells}
      </div>
      <div style="display:flex;gap:16px;margin-top:12px;font-size:12px;color:var(--coffee-light)">
        <span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:var(--caramel);vertical-align:middle;margin-right:4px"></span>활동 완료</span>
        <span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:var(--steam);vertical-align:middle;margin-right:4px"></span>예정 모임</span>
      </div>
    </div>`;
}

function renderSchedList() {
  // 완료 활동: activities에서 날짜별로 조 목록 집계
  const completedMap = {}; // date -> [{ team, month, speaker, topic }]
  Object.values(app.activities).forEach(a => {
    if (!completedMap[a.date]) completedMap[a.date] = [];
    completedMap[a.date].push(a);
  });

  // 예정 일정과 완료 활동을 합쳐 통합 타임라인 생성
  const items = [];

  app.schedules.forEach(s => {
    // 이미 완료 활동이 있는 날짜면 예정 항목은 생략 (완료로 대체)
    if (!completedMap[s.date]) {
      items.push({ date: s.date, type: 'scheduled', data: s });
    }
  });

  Object.entries(completedMap).forEach(([date, acts]) => {
    items.push({ date, type: 'completed', data: acts });
  });

  if (items.length === 0) return '<div class="empty-state">등록된 일정이 없습니다</div>';

  items.sort((a, b) => new Date(a.date) - new Date(b.date));

  return items.map(item => {
    const d = dday(item.date);
    const past = d < 0;
    const ddText = d === 0 ? 'D-Day' : past ? `D+${Math.abs(d)}` : `D-${d}`;

    if (item.type === 'completed') {
      // 같은 날짜에 여러 조가 있을 수 있으므로 조별로 나열
      const badgesHtml = item.data
        .sort((a, b) => a.team - b.team)
        .map(a => `<span class="team-badge badge-${a.team}" style="font-size:11px;padding:2px 8px">${a.team}조</span>`)
        .join('');
      const infoHtml = item.data
        .sort((a, b) => a.team - b.team)
        .map(a => `<span style="font-size:12px;color:var(--coffee-light)">${a.team}조 ${a.month}회차 · ${a.speaker}</span>`)
        .join('<span style="margin:0 4px;color:var(--steam)">·</span>');
      return `<div class="sched-item">
        <div class="sched-dday past">${ddText}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <div class="sched-date">${fmtDate(item.date)}</div>
            ${badgesHtml}
            <span style="font-size:11px;color:#27ae60;font-weight:500">완료</span>
          </div>
          <div style="margin-top:4px">${infoHtml}</div>
        </div>
      </div>`;
    } else {
      const s = item.data;
      const teamLabel = s.team && +s.team > 0 ? `${s.team}조` : '전체';
      const badgeCls  = s.team && +s.team > 0 ? `badge-${s.team}` : '';
      const badgeStyle = !s.team || +s.team === 0 ? 'background:var(--coffee-mid);color:var(--cream)' : '';
      return `<div class="sched-item">
        <div class="sched-dday">${ddText}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="sched-date">${fmtDate(item.date)}</div>
            <span class="team-badge ${badgeCls}" style="font-size:11px;padding:2px 8px;${badgeStyle}">${teamLabel}</span>
            <span style="font-size:11px;color:var(--coffee-light)">예정</span>
          </div>
          ${s.memo ? `<div class="sched-memo">${escHtml(s.memo)}</div>` : ''}
        </div>
      </div>`;
    }
  }).join('');
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

   MAIN RENDER

function render() {
  renderNav();
  const main = document.getElementById('main');
  if (!app.user) {
    if (app.screen === 'signup')  { main.innerHTML = renderSignup(); return; }
    if (app.screen === 'pending') { main.innerHTML = renderPending(); return; }
    main.innerHTML = renderLogin(); return;
  }
  switch(app.screen) {
    case 'home':     main.innerHTML = renderHome(); break;
    case 'team-1':   main.innerHTML = renderTeam(1); break;
    case 'team-2':   main.innerHTML = renderTeam(2); break;
    case 'team-3':   main.innerHTML = renderTeam(3); break;
    case 'schedule': main.innerHTML = renderSchedule(); break;

  }
}

function navigate(screen) {

}

/* ==============================
   AI
============================== */
async function callAI(prompt) {
  const key = localStorage.getItem('mir_api_key');
  if (!key) throw new Error('API 키가 설정되지 않았습니다. 관리자 → 설정에서 API 키를 입력해주세요.');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'content-type': 'application/json',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 600,
      messages: [{ role: 'user', content: prompt }],
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    const raw = err.error?.message || '';
    const friendly = raw.includes('invalid x-api-key') || raw.includes('authentication')
      ? 'API 키가 올바르지 않습니다. 관리자 → 설정에서 키를 다시 확인해주세요.'
      : raw.includes('credit') || raw.includes('billing')
        ? 'API 크레딧이 부족합니다. Anthropic 콘솔에서 잔액을 확인해주세요.'
        : raw || `API 오류 (${res.status})`;
    throw new Error(friendly);
  }
  const data = await res.json();
  return data.content[0].text;
}


async function handleAIType(key, type) {
  const act = app.activities[key];
  if (!act) return;
  const panel = document.getElementById(`assist-panel-${key}`);
  if (!panel) return;

  // mark selected
  panel.querySelectorAll('.ai-type-btn').forEach(b => b.classList.toggle('selected', b.dataset.type === type));

  const draftBox = panel.querySelector('.ai-draft-box') || (() => {
    const d = document.createElement('div'); d.className = 'ai-draft-box'; return d;
  })();

  if (!panel.contains(draftBox)) {
    const hint = panel.querySelector('.ai-assist-hint');
    if (hint) hint.replaceWith(draftBox);
    else panel.appendChild(draftBox);
  }

  draftBox.textContent = '✦ 초안을 작성하고 있어요...';

  // remove existing use button if any
  const old = panel.querySelector('[data-action="use-draft"]');
  if (old) old.remove();

  try {
    const text = await callAI(
      `당신은 직장 동료 커뮤니티 댓글 작성 도우미입니다.\n\n발표자: ${act.speaker}\n고민 주제: ${act.topic}\n토론 결과: ${act.content||'(미입력)'}\n\n위 활동에 대해 "${type}" 스타일로 2~3문장 댓글을 작성해주세요. 따뜻하고 진심 어린 한국어로, 직장 동료 간 적절한 어투를 사용하세요. 댓글 내용만 작성하고 다른 설명은 하지 마세요.`
    );
    app.aiAssistDraft[key] = { type, text };
    draftBox.textContent = text;
    const useBtn = document.createElement('button');
    useBtn.className = 'btn btn-primary btn-sm';
    useBtn.textContent = '이 내용 사용하기';
    useBtn.dataset.action = 'use-draft';
    useBtn.dataset.key = key;
    draftBox.after(useBtn);
  } catch(e) {
    draftBox.innerHTML = `<span class="msg-error">⚠ ${escHtml(e.message)}</span>`;
  }
}

/* ==============================
   EVENT DELEGATION
============================== */
document.addEventListener('click', async e => {
  const el = e.target.closest('[data-action],[data-nav]');
  if (!el) return;

  const action = el.dataset.action;
  const nav = el.dataset.nav;

  if (nav) { navigate(nav); return; }

  /* --- AUTH --- */
  if (action === 'logout') { logout(); return; }

  if (action === 'login') {
    const name = document.getElementById('login-name')?.value.trim();
    const pw   = document.getElementById('login-pw')?.value;
    const msg  = document.getElementById('login-msg');
    if (!name || !pw) { msg.innerHTML = '<div class="msg-error">이름과 비밀번호를 입력해주세요</div>'; return; }
    const result = tryLogin(name, pw);
    if (result === 'ok')      { navigate('home'); return; }
    if (result === 'pending') { navigate('pending'); return; }
    msg.innerHTML = '<div class="msg-error">이름 또는 비밀번호가 올바르지 않습니다</div>';
    return;
  }

  if (action === 'signup') {
    const name = document.getElementById('su-name')?.value.trim();
    const team = document.getElementById('su-team')?.value;
    const pw   = document.getElementById('su-pw')?.value;
    const pw2  = document.getElementById('su-pw2')?.value;
    const msg  = document.getElementById('su-msg');
    if (!name)        { msg.innerHTML = '<div class="msg-error">이름을 입력해주세요</div>'; return; }
    if (!team)        { msg.innerHTML = '<div class="msg-error">소속 조를 선택해주세요</div>'; return; }
    if (!pw || pw.length < 4) { msg.innerHTML = '<div class="msg-error">비밀번호는 4자 이상이어야 합니다</div>'; return; }
    if (pw !== pw2)   { msg.innerHTML = '<div class="msg-error">비밀번호가 일치하지 않습니다</div>'; return; }
    if (app.users[name] || app.pending[name] || name === ADMIN_NAME) {
      msg.innerHTML = '<div class="msg-error">이미 사용 중인 이름입니다</div>'; return;
    }
    app.pending[name] = { pw, team: +team, requestedAt: new Date().toLocaleDateString('ko-KR') };
    S.set('mir_pending', app.pending);
    navigate('pending');
    return;
  }

  /* --- ADMIN TAB --- */
  if (action === 'admin-tab') {
    app.adminTab = el.dataset.tab;
    app.editKey = null;
    render();
    return;
  }

  /* --- MEMBER MANAGEMENT --- */
  if (action === 'approve') {
    const name = el.dataset.name;
    if (!app.pending[name]) return;
    app.users[name] = { pw: app.pending[name].pw, team: app.pending[name].team };
    delete app.pending[name];
    S.set('mir_users', app.users);
    S.set('mir_pending', app.pending);
    render();
    return;
  }

  if (action === 'reject') {
    const name = el.dataset.name;
    if (!confirm(`'${name}'의 가입 신청을 거절하시겠습니까?`)) return;
    delete app.pending[name];
    S.set('mir_pending', app.pending);
    render();
    return;
  }

  if (action === 'revoke') {
    const name = el.dataset.name;
    if (!confirm(`'${name}'의 회원 자격을 해제하시겠습니까?`)) return;
    delete app.users[name];
    S.set('mir_users', app.users);
    render();
    return;
  }

  /* --- ACTIVITY CRUD --- */
  if (action === 'save-activity') {
    const team    = +document.getElementById('act-team')?.value;
    const month   = +document.getElementById('act-month')?.value;
    const date    = document.getElementById('act-date')?.value;
    const speaker = document.getElementById('act-speaker')?.value.trim();
    const topic   = document.getElementById('act-topic')?.value.trim();
    const content = document.getElementById('act-content')?.value.trim();
    const msg     = document.getElementById('act-msg');

    if (!team || !month || !date || !speaker || !topic) {
      msg.innerHTML = '<div class="msg-error">조, 회차, 날짜, 발표자, 고민 주제는 필수입니다</div>'; return;
    }

    if (app.editKey) {
      app.activities[app.editKey] = { ...app.activities[app.editKey], team, month, date, speaker, topic, content };
      app.editKey = null;
    } else {
      const key = `t${team}_${Date.now()}`;
      app.activities[key] = { team, month, date, speaker, topic, content, ts: Date.now() };
    }
    S.set('mir_activities', app.activities);
    app.adminTab = 'manage';
    render();
    return;
  }

  if (action === 'edit-activity') {
    const key = el.dataset.key;
    app.editKey = key;
    app.adminTab = 'register';
    navigate('admin');
    return;
  }

  if (action === 'cancel-edit') {
    app.editKey = null;
    app.adminTab = 'manage';
    render();
    return;
  }

  if (action === 'del-activity') {
    const key = el.dataset.key;
    if (!confirm('활동을 삭제하시겠습니까? 댓글과 공감도 함께 삭제됩니다.')) return;
    delete app.activities[key];
    delete app.comments[key];
    // delete reactions for this activity
    Object.keys(app.reactions).forEach(k => { if (k.startsWith(key+'_')) delete app.reactions[k]; });
    S.set('mir_activities', app.activities);
    S.set('mir_comments', app.comments);
    S.set('mir_reactions', app.reactions);
    render();
    return;
  }

  /* --- COMMENTS --- */
  if (action === 'submit-comment') {
    const key = el.dataset.key;
    const ta = document.getElementById(`cinput-${key}`);
    const text = ta?.value.trim();
    if (!text) return;
    if (!app.comments[key]) app.comments[key] = [];
    app.comments[key].push({ author: app.user.name, text, time: Date.now() });
    S.set('mir_comments', app.comments);
    app.aiAssistOpen.delete(key);
    delete app.aiAssistDraft[key];
    render();
    return;
  }

  if (action === 'del-comment') {
    const key = el.dataset.key;
    const idx = +el.dataset.idx;
    if (!confirm('댓글을 삭제하시겠습니까?')) return;
    app.comments[key].splice(idx, 1);
    S.set('mir_comments', app.comments);
    render();
    return;
  }

  /* --- REACTIONS --- */
  if (action === 'react') {
    const key   = el.dataset.key;
    const idx   = +el.dataset.idx;
    const rtype = el.dataset.rtype;
    const rk = `${key}_${idx}_${rtype}`;
    if (!app.reactions[rk]) app.reactions[rk] = { count: 0, users: [] };
    const rx = app.reactions[rk];
    const pos = rx.users.indexOf(app.user.name);
    if (pos === -1) { rx.users.push(app.user.name); rx.count++; }
    else            { rx.users.splice(pos, 1); rx.count = Math.max(0, rx.count - 1); }
    S.set('mir_reactions', app.reactions);
    // update button in-place
    el.classList.toggle('active', rx.users.includes(app.user.name));
    const label = REACTION_TYPES.find(r => r.key === rtype)?.label || '';
    el.textContent = `${label} ${rx.count}`;
    return;
  }

  /* --- AI --- */
  if (action === 'toggle-assist') {
    const key = el.dataset.key;
    if (app.aiAssistOpen.has(key)) {
      app.aiAssistOpen.delete(key);
      delete app.aiAssistDraft[key];
    } else {
      app.aiAssistOpen.add(key);
    }
    render();
    return;
  }

  if (action === 'ai-type') {
    await handleAIType(el.dataset.key, el.dataset.type);
    return;
  }

  if (action === 'use-draft') {
    const key = el.dataset.key;
    const draft = app.aiAssistDraft[key];
    if (draft && draft.text) {
      const ta = document.getElementById(`cinput-${key}`);
      if (ta) ta.value = draft.text;
      app.aiAssistOpen.delete(key);
      delete app.aiAssistDraft[key];
      render();
    }
    return;
  }

  /* --- CALENDAR --- */
  if (action === 'cal-prev') {
    if (app.calMonth === 0) { app.calMonth = 11; app.calYear--; }
    else app.calMonth--;
    render();
    return;
  }
  if (action === 'cal-next') {
    if (app.calMonth === 11) { app.calMonth = 0; app.calYear++; }
    else app.calMonth++;
    render();
    return;
  }

  /* --- SCHEDULE --- */
  if (action === 'add-schedule') {
    const date = document.getElementById('sched-date')?.value;
    const team = document.getElementById('sched-team')?.value || '0';
    const memo = document.getElementById('sched-memo')?.value.trim();
    const msg  = document.getElementById('sched-msg');
    if (!date) { msg.innerHTML = '<div class="msg-error">날짜를 선택해주세요</div>'; return; }
    if (app.schedules.find(s => s.date === date && (s.team||'0') === team)) {
      msg.innerHTML = '<div class="msg-error">같은 날짜·조의 일정이 이미 등록되어 있습니다</div>'; return;
    }
    app.schedules.push({ date, team, memo: memo || '' });
    S.set('mir_schedules', app.schedules);
    render();
    return;
  }

  if (action === 'del-schedule') {
    const idx = +el.dataset.idx;
    if (!confirm('일정을 삭제하시겠습니까?')) return;
    app.schedules.splice(idx, 1);
    S.set('mir_schedules', app.schedules);
    render();
    return;
  }

  /* --- REFRESH --- */
  if (action === 'refresh-data') {
    const btn = document.querySelector('[data-action="refresh-data"]');
    if (btn) { btn.textContent = '↺'; btn.disabled = true; }
    await loadAll();
    render();
    return;
  }

  /* --- FIREBASE --- */
  if (action === 'test-firebase') {
    const val = document.getElementById('fb-url-input')?.value.trim().replace(/\/$/, '');
    const msg = document.getElementById('fb-msg');
    if (!val) { msg.innerHTML = '<div class="msg-error">URL을 입력해주세요</div>'; return; }
    msg.innerHTML = '<div class="msg-info">연결 확인 중...</div>';
    try {
      const res = await fetch(`${val}.json`);
      if (res.ok) {
        msg.innerHTML = '<div class="msg-success">✓ 연결 성공! 저장 버튼을 눌러주세요</div>';
      } else {
        msg.innerHTML = `<div class="msg-error">✗ 연결 실패 (${res.status}) — Firebase 규칙을 확인해주세요</div>`;
      }
    } catch(e) {
      msg.innerHTML = `<div class="msg-error">✗ ${escHtml(e.message)}</div>`;
    }
    return;
  }

  if (action === 'save-firebase-url') {
    const val = document.getElementById('fb-url-input')?.value.trim().replace(/\/$/, '');
    const msg = document.getElementById('fb-msg');
    if (!val) {
      localStorage.removeItem('mir_firebase_url');
      msg.innerHTML = '<div class="msg-info">Firebase URL이 제거되었습니다</div>';
      setTimeout(() => render(), 1000);
      return;
    }
    localStorage.setItem('mir_firebase_url', val);
    msg.innerHTML = '<div class="msg-success">✓ 저장되었습니다. 데이터를 업로드하는 중...</div>';
    // 현재 localStorage 데이터를 Firebase에 일괄 업로드
    try {
      await fetch(`${val}.json`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          activities: app.activities,
          comments:   app.comments,
          reactions:  app.reactions,
          schedules:  app.schedules,
          users:      app.users,
          pending:    app.pending,
        }),
      });
      msg.innerHTML = '<div class="msg-success">✓ Firebase에 연결되어 데이터가 업로드되었습니다</div>';
    } catch(e) {
      msg.innerHTML = '<div class="msg-success">✓ URL 저장 완료 (업로드 실패 — 규칙 확인 필요)</div>';
    }
    setTimeout(() => render(), 1500);
    return;
  }

  /* --- SETTINGS --- */
  if (action === 'test-apikey') {
    const val = document.getElementById('api-key-input')?.value.trim();
    const msg = document.getElementById('apikey-msg');
    if (!val) { msg.innerHTML = '<div class="msg-error">API 키를 먼저 입력해주세요</div>'; return; }
    msg.innerHTML = '<div class="msg-info">✦ API 키 확인 중...</div>';
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': val,
          'anthropic-version': '2023-06-01',
          'content-type': 'application/json',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 10, messages: [{ role: 'user', content: 'hi' }] }),
      });
      if (res.ok || res.status === 400) {
        // 400 = bad request (model/params issue) but key is valid
        msg.innerHTML = '<div class="msg-success">✓ API 키가 유효합니다! 저장 버튼을 눌러주세요</div>';
      } else {
        const err = await res.json().catch(() => ({}));
        const errMsg = err.error?.message || `오류 코드 ${res.status}`;
        msg.innerHTML = `<div class="msg-error">✗ 키 오류: ${escHtml(errMsg)}<br><span style="font-size:12px">키를 다시 확인해주세요 (공백이나 불필요한 문자가 없는지 확인)</span></div>`;
      }
    } catch(e) {
      msg.innerHTML = `<div class="msg-error">✗ 연결 실패: ${escHtml(e.message)}</div>`;
    }
    return;
  }

  if (action === 'save-apikey') {
    const val = document.getElementById('api-key-input')?.value.trim();
    const msg = document.getElementById('apikey-msg');
    if (!val) { msg.innerHTML = '<div class="msg-error">API 키를 입력해주세요</div>'; return; }
    localStorage.setItem('mir_api_key', val);
    msg.innerHTML = '<div class="msg-success">✓ API 키가 저장되었습니다</div>';
    setTimeout(() => render(), 1500);
    return;
  }
});

/* ENTER key on login/signup inputs */
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (e.target.id === 'login-name' || e.target.id === 'login-pw') {
    document.querySelector('[data-action="login"]')?.click();
  }
});

/* ==============================
   INIT
============================== */
(async function init() {
  // 세션 복원
  try {
    const saved = JSON.parse(sessionStorage.getItem('mir_session'));
    if (saved && saved.name) app.user = saved;
  } catch {}

  // Firebase에서 항상 데이터 로딩
  document.getElementById('main').innerHTML =
    '<div style="text-align:center;padding:80px 20px;color:var(--coffee-light);font-family:\'Noto Serif KR\',serif;font-size:15px">☕ 데이터를 불러오는 중...</div>';

  await loadAll();
  app.screen = app.user ? 'home' : 'login';
  render();
})();
</script>
